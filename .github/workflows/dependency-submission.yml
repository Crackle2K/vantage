name: Dependency Submission

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write

jobs:
  submit-python-backend-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Submit backend dependency graph
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.3
        with:
          filePath: backend
          detector-name: python-backend-dependency-submission
          detector-version: 1.0.0
          detector-url: https://github.com/advanced-security/component-detection-dependency-submission-action
