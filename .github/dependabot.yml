version: 2
updates:
  # Frontend: npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 67
    reviewers:
      - "Crackle2K"
      - "MisplacedOrange"
    labels:
      - "dependencies"
      - "frontend"

  # Backend/API: Rust Cargo workspace
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 67
    reviewers:
      - "Crackle2K"
      - "MisplacedOrange"
    labels:
      - "dependencies"
      - "backend"
      - "rust"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    reviewers:
      - "Crackle2K"
      - "MisplacedOrange"
    labels:
      - "dependencies"
      - "ci"
