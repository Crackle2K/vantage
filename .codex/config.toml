# Codex CLI — Vantage project configuration
# https://developers.openai.com/codex/config-reference

# ── Model ──────────────────────────────────────────────
# model = "5.4"                       # Override if you have access to a specific model
# model_reasoning_effort = "medium"   # minimal | low | medium | high | xhigh

# ── Permissions ────────────────────────────────────────
# Start strict; loosen only when confident
approval_policy = "on-request"        # untrusted | on-request | never
sandbox_mode = "workspace-write"      # read-only | workspace-write | danger-full-access

# ── Web search ─────────────────────────────────────────
web_search = "cached"                 # disabled | cached | live

# ── Project doc fallback ───────────────────────────────
# Codex loads AGENTS.md by default; these are additional fallback names
# project_doc_fallback_filenames = ["CODEX.md", "CLAUDE.md"]

# ── MCP Servers ────────────────────────────────────────
# Uncomment and configure as needed. Keep tokens in env vars, not here.

# [mcp_servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]

# ── Profiles ───────────────────────────────────────────
# Usage: codex --profile <name>

[profiles.ci]
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.safe]
approval_policy = "untrusted"
sandbox_mode = "read-only"